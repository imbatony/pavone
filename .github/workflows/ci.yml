name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# 开发工具（black, isort, flake8, pyright, pytest 等）已在 pyproject.toml [dependency-groups] dev 中声明
# uv sync 会自动安装所有 dev 依赖，无需 uv add --dev

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
        restore-keys: ${{ runner.os }}-uv-

    - name: Sync dependencies
      run: uv sync

    - name: Run Black (Code formatting check)
      run: uv run black --check --diff pavone/ tests/

    - name: Run isort (Import sorting check)
      run: uv run isort --check-only --diff pavone/ tests/

    - name: Run flake8 (Critical errors)
      run: uv run flake8 pavone/ tests/ --select=E9,F63,F7,F82

    - name: Run flake8 (Code quality)
      run: uv run flake8 pavone/ tests/ --exit-zero

    - name: Run Pyright (Type checking)
      run: uv run pyright pavone/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-${{ matrix.python-version }}-uv-${{ hashFiles('**/uv.lock') }}
        restore-keys: ${{ runner.os }}-${{ matrix.python-version }}-uv-

    - name: Sync dependencies
      run: uv sync

    - name: Run tests with coverage
      run: uv run pytest tests/ -v -m "not integration" --cov=pavone --cov-report=xml --cov-report=term-missing

    - name: Upload coverage reports to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-security-${{ hashFiles('**/uv.lock') }}
        restore-keys: ${{ runner.os }}-uv-security-

    - name: Sync dependencies
      run: uv sync

    - name: Run safety (dependency vulnerability check)
      # safety check 已被官方标记为 deprecated; pip 等工具链漏洞不受项目控制
      run: uv run safety check || true
      continue-on-error: true

    - name: Run bandit (security linting)
      run: uv run bandit -r pavone/ -ll -ii -f json

  build-and-validate:
    name: Build and Validate Package
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-build-${{ hashFiles('**/uv.lock') }}
        restore-keys: ${{ runner.os }}-uv-build-

    - name: Sync dependencies
      run: uv sync

    - name: Build package
      run: uv run python -m build

    - name: Validate package
      run: uv run twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-integration-${{ hashFiles('**/uv.lock') }}
        restore-keys: ${{ runner.os }}-uv-integration-

    - name: Sync dependencies
      run: uv sync

    - name: Run CLI integration tests
      run: uv run python -m pavone.cli --help || true

    - name: Test package installation
      run: |
        uv run python -c "
        try:
            from pavone.core.downloader import HTTPDownloader, M3U8Downloader
            from pavone.config.settings import DownloadConfig
            print('✓ All imports successful')
        except ImportError as e:
            print(f'✗ Import failed: {e}')
            exit(1)
        "
